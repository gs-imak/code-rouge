name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # shellcheck is preinstalled on ubuntu-latest runners.
      - run: shellcheck tools/scripts/*.sh

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: android-actions/setup-android@v3
        with:
          # SDK + build-tools versions match the chantier-04-followup
          # `android/build.gradle` (RN 0.85 default). NDK is intentionally
          # omitted — Hermes ships prebuilt .so via the gradle dependency,
          # so no C/C++ compile happens in this build.
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'
      # Cache gradle's user-home and the per-app .gradle dir. Gradle
      # downloads ~300 MB of dependencies on a cold build; this cuts the
      # warm-build install step from ~3 min to ~30 s.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/*/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/*/android/**/*.gradle*', 'apps/*/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:android
      - uses: actions/upload-artifact@v4
        with:
          name: code-rouge-apks
          path: apps/*/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      # electron-builder caches its downloaded electron + winCodeSign
      # binaries here. ~150 MB total; cuts the warm install step from
      # ~90 s to <10 s.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-builder-${{ runner.os }}-${{ hashFiles('apps/assaut/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-
      # NSIS resource bundling (rcedit for icon + version stamping) needs
      # wine on Linux runners. ~30 s on a cold runner; cheaper than
      # switching the whole job to windows-latest.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends wine
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:windows
      - uses: actions/upload-artifact@v4
        with:
          name: code-rouge-assaut-exe
          path: |
            apps/assaut/release/*.exe
            apps/assaut/release/*.yml
            apps/assaut/release/*.blockmap
          if-no-files-found: error
          retention-days: 14
