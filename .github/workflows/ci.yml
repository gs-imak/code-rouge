name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # shellcheck is preinstalled on ubuntu-latest runners.
      - run: shellcheck tools/scripts/*.sh

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: android-actions/setup-android@v3
        with:
          # SDK + build-tools versions match the chantier-04-followup
          # `android/build.gradle` (RN 0.85 default). NDK is intentionally
          # omitted — Hermes ships prebuilt .so via the gradle dependency,
          # so no C/C++ compile happens in this build.
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'
      # Cache gradle's user-home and the per-app .gradle dir. Gradle
      # downloads ~300 MB of dependencies on a cold build; this cuts the
      # warm-build install step from ~3 min to ~30 s.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/*/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/*/android/**/*.gradle*', 'apps/*/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:android
      - uses: actions/upload-artifact@v4
        with:
          name: code-rouge-apks
          path: apps/*/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          # 3 days is enough for a preview-from-CI flow while keeping the
          # account artifact quota in check. Long-term distribution goes
          # through GitHub Releases (binaries attached to v* tags).
          retention-days: 3

  build-windows:
    name: Build Windows
    # Native Windows runner: rcedit is a 32-bit Windows binary, and the
    # Linux + wine32 path needs i386 architecture-add + multiple support
    # packages, plus electron-builder calls rcedit-ia32.exe which fails
    # on amd64-only wine. The native runner skips all that — slower than
    # ubuntu but reliable, and matches the deployment target.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      # electron-builder caches its downloaded electron binary here. The
      # path differs on Windows from Linux's ~/.cache/electron.
      - uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}/electron/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('apps/assaut/package.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:windows
      - uses: actions/upload-artifact@v4
        with:
          name: code-rouge-assaut-exe
          path: |
            apps/assaut/release/*.exe
            apps/assaut/release/*.yml
            apps/assaut/release/*.blockmap
          if-no-files-found: error
          # 3 days is enough for a preview-from-CI flow while keeping the
          # account artifact quota in check. Long-term distribution goes
          # through GitHub Releases (binaries attached to v* tags).
          retention-days: 3
